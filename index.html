<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 爸爸與女兒的單車環台小旅行</title>
    <meta
      name="description"
      content="2026 爸爸與女兒的單車環台小旅行：台中、台南、恆春、台東、花蓮、宜蘭、桃園與新竹海岸的互動行程頁。"
    />
    <link rel="icon" href="assets/hero-cycling-taiwan.svg" />
    <link rel="preload" href="assets/hero-cycling-taiwan-photo.jpg" as="image" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body id="top">
    <nav class="topbar" aria-label="主要導覽">
      <a href="#top" class="logo">SNS 父女單車環島</a>
      <ul>
        <li><a href="#story">出發理由</a></li>
        <li><a href="#overview">旅程特色</a></li>
        <li><a href="#route">行程路線</a></li>
      </ul>
    </nav>

    <header class="hero">
      <h2>2026 小學畢業前的台灣記憶</h2>
      <h1 id="page-title">用自己的雙腳，認識台灣</h1>
      <p>爸爸與女兒一起從台中出發，往南、轉東、再回到北部與西部海岸，用六天把地圖上的距離踩進心裡。</p>
      <div class="btn-group">
        <a class="btn btn-primary" href="#route" data-icon="route">查看互動行程</a>
        <a class="btn btn-secondary" href="#story" data-icon="heart">閱讀出發理由</a>
      </div>
    </header>

    <main>
      <section id="story" class="story">
        <h2 class="section-title">Trip Story</h2>
        <p class="section-subtitle">為什麼要出發？</p>
        <article class="story-copy"></article>
      </section>

      <section id="overview" class="overview-section">
        <h2 class="section-title">Tour Overview</h2>
        <p class="section-subtitle">我們即將創造的里程碑</p>
        <div class="overview-cards" aria-label="旅程重點">
          <div class="card">
            <h3>6</h3>
            <p>天行程</p>
          </div>
          <div class="card">
            <h3>12+</h3>
            <p>重要城鎮</p>
          </div>
          <div class="card">
            <h3>3</h3>
            <p>自行車道重點</p>
          </div>
          <div class="card">
            <h3>1</h3>
            <p>共同完成的回憶</p>
          </div>
        </div>
      </section>

      <section class="route-section" id="route">
        <div class="section-heading">
          <h2 class="section-title">Interactive Route</h2>
          <p class="section-subtitle">點選日期可以切換每日主圖、路線重點、住宿房型、距離與沿途景點。</p>
        </div>
        <div class="route-layout">
          <aside class="day-tabs" aria-label="選擇日期"></aside>
          <article class="day-panel" aria-live="polite"></article>
        </div>
      </section>
    </main>

    <footer>
      <p>2026 爸爸與女兒的單車環台小旅行 | <a href="#top">回到最上方</a></p>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
